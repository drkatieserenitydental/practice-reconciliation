async function extractTextFromPDF(file, startPage = 1) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = "";
  for (let i = startPage; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(item => item.str).join(" ") + "\n";
  }
  if (text.length > 80000) text = text.substring(0, 80000);
  return text;
}

function fmt(n) {
  if (n == null) return "—";
  return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(n);
}

  function reReconcile(liveVendors) {
    // Re-evaluate discrepancies using live sheet amounts
    setMatches(prev => prev.map(m => {
      const liveV = liveVendors.find(v => v.name.toLowerCase() === (m.vendorMatch || "").toLowerCase());
      const expectedAmt = liveV?.expectedAmount ?? m.vendor?.expectedAmount;
      const discrepancies = [];
      if (expectedAmt && Math.abs(m.amount - expectedAmt) > 0.50) {
        discrepancies.push(`Expected ${fmt(expectedAmt)}, charged ${fmt(m.amount)}`);
      }
      return { ...m, discrepancies };
    }));
    // Also update boaResults and amexResults
    setBoaResults(prev => {
      if (!prev) return prev;
      return { ...prev, matches: prev.matches.map(m => {
        const liveV = liveVendors.find(v => v.name.toLowerCase() === (m.vendorMatch || "").toLowerCase());
        const expectedAmt = liveV?.expectedAmount ?? m.vendor?.expectedAmount;
        const discrepancies = [];
        if (expectedAmt && Math.abs(m.amount - expectedAmt) > 0.50) {
          discrepancies.push(`Expected ${fmt(expectedAmt)}, charged ${fmt(m.amount)}`);
        }
        return { ...m, discrepancies };
      })};
    });
    setAmexResults(prev => {
      if (!prev) return prev;
      return { ...prev, matches: prev.matches.map(m => {
        const liveV = liveVendors.find(v => v.name.toLowerCase() === (m.vendorMatch || "").toLowerCase());
        const expectedAmt = liveV?.expectedAmount ?? m.vendor?.expectedAmount;

        if (expectedAmt && Math.abs(m.amount - expectedAmt) > 0.50) {

  async function parsePDF(pdfFile) {
    setStep("parsing");
    setError(null);
    try {
      const startPage = account === "Amex" ? 3 : 1;
      const pdfText = await extractTextFromPDF(pdfFile, startPage);
      if (!pdfText || pdfText.trim().length < 50) throw new Error("Could not extract text from PDF.");

      const vendorList = VENDORS.filter(v => v.method === account)
        .map(v => {
          const aliases = v.aliases ? ` (also known as: ${v.aliases.join(", ")})` : "";
          return `${v.name}${aliases}|expected:${v.expectedAmount ? fmt(v.expectedAmount) : "variable"}`;
        })
        .join(", ");

      const prompt = `Extract ALL transactions from this bank statement as a JSON array. Each item: {"date":"YYYY-MM-DD","description":"string","amount":number,"vendorMatch":"vendor name or null","matchConfidence":"high|medium|low|none"}. Amount positive=charge, negative=credit. Match vendorMatch ONLY to vendors in this list: ${vendorList}. IMPORTANT: Some vendors have aliases in parentheses — if a transaction description matches an alias, use the PRIMARY vendor name as vendorMatch. Return ONLY the JSON array.\n\n${pdfText}`;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 8000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      if (!data.content) throw new Error("No content in response");

      const raw = data.content.map(c => c.text || "").join("").replace(/```json|```/g, "").trim();
      const start = raw.indexOf("[");
      const end = raw.lastIndexOf("]");
      if (start === -1 || end === -1) throw new Error("No JSON array in response: " + raw.substring(0, 200));
      const parsed = JSON.parse(raw.substring(start, end + 1));
      reconcile(parsed, sheetVendors);
      setStep("review");
    } catch (e) {
      setError("Failed to parse statement: " + e.message);
      setStep("upload");
    }
  }

  function reconcile(txns, liveVendors) {
    const accountVendors = VENDORS.filter(v => v.method === account);
    // Force alias matching — override AI vendorMatch based on description keywords
    const aliasMap = VENDORS.filter(v => v.aliases).flatMap(v =>
      v.aliases.map(alias => ({ alias: alias.toLowerCase(), name: v.name }))
    );
    txns = txns.map(tx => {
      if (tx.vendorMatch) return tx; // already matched
      const desc = (tx.description || "").toLowerCase();
      const aliasHit = aliasMap.find(a => desc.includes(a.alias));
      if (aliasHit) return { ...tx, vendorMatch: aliasHit.name, matchConfidence: "high" };
      return tx;
    });
    // Also fix already-matched transactions where AI used wrong name
    txns = txns.map(tx => {
      const desc = (tx.description || "").toLowerCase();
      const aliasHit = aliasMap.find(a => desc.includes(a.alias));
      if (aliasHit) return { ...tx, vendorMatch: aliasHit.name, matchConfidence: "high" };
      return tx;
    });
    const matched = [], unmatched = [];
    const matchedNames = new Set();
    for (const tx of txns) {
      if (tx.amount <= 0) continue;
      if (tx.vendorMatch && tx.matchConfidence !== "none") {
        const vendor = accountVendors.find(v =>
          v.name === tx.vendorMatch ||
          (v.aliases && v.aliases.some(a => a.toLowerCase() === (tx.vendorMatch || "").toLowerCase()))
        );
        // Normalize vendorMatch to canonical name
        if (vendor && tx.vendorMatch !== vendor.name) tx = { ...tx, vendorMatch: vendor.name };
        const liveVendor = (liveVendors || sheetVendors) ? (liveVendors || sheetVendors).find(v => v.name.toLowerCase() === tx.vendorMatch.toLowerCase()) : null;
        const expectedAmt = liveVendor?.expectedAmount ?? vendor?.expectedAmount;
        // Special case: Cloud — membership fee is "CloudDentistry", service fee is "clouddentistry.com"
        // Only track the membership fee, ignore service fees
        if (tx.vendorMatch === "Cloud") {
          const desc = tx.description || "";
          if (desc.toLowerCase().includes("clouddentistry.com") || !desc.toLowerCase().includes("clouddentistry")) {
            unmatched.push({ ...tx, description: tx.description + " [Cloud service fee — not tracked]" });
            continue;
          }
        }
        const discrepancies = [];
        if (expectedAmt && Math.abs(tx.amount - expectedAmt) > 0.50) {
          discrepancies.push(`Expected ${fmt(expectedAmt)}, charged ${fmt(tx.amount)}`);
        }
        const notes = [];
        if (vendor?.optional) notes.push("Note: may apply to prior month's statement");
        matched.push({ ...tx, vendor, discrepancies, notes });
        matchedNames.add(tx.vendorMatch);
      } else {
        unmatched.push(tx);
      }
    }
    // Post-process: resolve aliases that the AI missed
    // For each vendor with aliases, scan unmatched transactions and force-match
    const stillUnmatched = [];
    for (const tx of unmatched) {
      const desc = (tx.description || "").toLowerCase();
      const aliasVendor = accountVendors.find(v =>
        v.aliases && v.aliases.some(a => desc.includes(a.toLowerCase()))
      );
      if (aliasVendor) {
        const liveVendor = (liveVendors || sheetVendors) ? (liveVendors || sheetVendors).find(v => v.name.toLowerCase() === aliasVendor.name.toLowerCase()) : null;
        const expectedAmt = liveVendor?.expectedAmount ?? aliasVendor?.expectedAmount;
        const discrepancies = [];
        if (expectedAmt && Math.abs(tx.amount - expectedAmt) > 0.50) {
          discrepancies.push(`Expected ${fmt(expectedAmt)}, charged ${fmt(tx.amount)}`);
        }
        matched.push({ ...tx, vendorMatch: aliasVendor.name, vendor: aliasVendor, discrepancies, notes: [] });
        matchedNames.add(aliasVendor.name);
      } else {
        stillUnmatched.push(tx);
      }
    }
    unmatched.length = 0;
    unmatched.push(...stillUnmatched);

    // Special case: Pittman — reassign multiple matches correctly
    // If 1 match: assign to Benson. If 2 matches: higher = Benson, lower = Plaisance.
    const pittmanMatches = matched.filter(m => m.vendorMatch && m.vendorMatch.toLowerCase().includes("pittman"));
    const nonPittman = matched.filter(m => !m.vendorMatch || !m.vendorMatch.toLowerCase().includes("pittman"));
    if (pittmanMatches.length === 1) {
      pittmanMatches[0] = { ...pittmanMatches[0], vendorMatch: "Pittman - Benson" };
    } else if (pittmanMatches.length >= 2) {
      const sorted = [...pittmanMatches].sort((a, b) => b.amount - a.amount);
      sorted[0] = { ...sorted[0], vendorMatch: "Pittman - Benson" };
      sorted[1] = { ...sorted[1], vendorMatch: "Pittman - Plaisance" };
      pittmanMatches.length = 0;
      pittmanMatches.push(...sorted.slice(0, 2));
    }
    const finalMatched = [...nonPittman, ...pittmanMatches];
    const finalMatchedNames = new Set(finalMatched.map(m => m.vendorMatch).filter(Boolean));

    const activeLiveVendors = liveVendors || sheetVendors;
    const miss = accountVendors.filter(v => {
      if (finalMatchedNames.has(v.name) || matchedNames.has(v.name)) return false;
      if (v.optional) return false;
      const liveV = activeLiveVendors ? activeLiveVendors.find(s => s.name.toLowerCase() === v.name.toLowerCase()) : null;
      const amt = liveV?.expectedAmount ?? v.expectedAmount;
      return amt != null;
    });
    setMatches(finalMatched);
    setUnmatched(unmatched);
    setMissing(miss);
    const results = { matches: finalMatched, unmatched, missing: miss, account };
    if (account === "BoA") setBoaResults(results);
    else setAmexResults(results);
  }

  async function writeToSheets() {
    setSheetStatus("loading");
    const monthIdx = MONTH_LABELS.indexOf(month);
    const amountColIdx = 10 + monthIdx * 2;
    const dateColIdx = 11 + monthIdx * 2;
    const col = (i) => i < 26 ? String.fromCharCode(65 + i) : "A" + String.fromCharCode(65 + i - 26);
    try {
      const readRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A1:A100`, {
        headers: { "Authorization": `Bearer ${sheetsToken}` }
      });
      const readJson = await readRes.json();
      if (readJson.error) throw new Error("Could not read sheet: " + readJson.error.message);
      const sheetRows = (readJson.values || []).map((row, idx) => ({ name: (row[0] || "").trim(), row: idx + 1 }));
      const updates = [];
      for (const m of matches) {
        const found = sheetRows.find(v => v.name.toLowerCase() === m.vendorMatch.toLowerCase());
        if (!found) continue;
        updates.push({ range: `${col(amountColIdx)}${found.row}`, values: [[m.amount]] });
        updates.push({ range: `${col(dateColIdx)}${found.row}`, values: [[m.date]] });
      }
      if (updates.length === 0) throw new Error("No matching vendors found in sheet");
      const writeRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchUpdate`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${sheetsToken}`, "Content-Type": "application/json" },
        body: JSON.stringify({ valueInputOption: "USER_ENTERED", data: updates })
      });
      const writeJson = await writeRes.json();
      if (writeJson.error) throw new Error(writeJson.error.message);
      setSheetStatus("success");
    } catch (e) {
      setSheetStatus("error: " + e.message);
    }
  }

  function buildSection(label, results) {
    if (!results) return [];
    const { matches: m, unmatched: u, missing: miss } = results;
    const disc = m.filter(x => x.discrepancies.length > 0);
    return [
      "", `━━━━ ${label} ━━━━`, "",
      "✅ CONFIRMED",
      ...m.filter(x => x.discrepancies.length === 0).map(x => `  ${x.vendorMatch.padEnd(35)} ${fmt(x.amount).padStart(12)}   ${x.date}`),
      ...(disc.length > 0 ? ["", "⚠️  DISCREPANCIES", ...disc.map(x => `  ${x.vendorMatch}: ${x.discrepancies.join("; ")}`)] : []),
      ...(miss.length > 0 ? ["", "❌ MISSING", ...miss.map(v => `  ${v.name.padEnd(35)} ${fmt(v.expectedAmount).padStart(12)}`)] : []),
      ...(u.length > 0 ? ["", "🔍 UNRECOGNIZED", ...u.map(t => `  ${t.description.substring(0, 35).padEnd(35)} ${fmt(t.amount).padStart(12)}   ${t.date}`)] : []),
    ];
  }

  function buildEmail() {
    const all = [...(boaResults?.matches || []), ...(amexResults?.matches || [])];
    const total = all.filter(m => m.discrepancies.length === 0).reduce((s, m) => s + m.amount, 0);
    return [
      `RECONCILIATION SUMMARY — ${month}`,
      `Generated: ${new Date().toLocaleDateString()}`,
      `Total Confirmed: ${fmt(total)}`,
      ...buildSection("BANK OF AMERICA", boaResults),
      ...buildSection("AMERICAN EXPRESS", amexResults),
    ].join("\n");
  }

  async function sendGmail() {
    setGmailStatus("loading");
    const body = buildEmail();
    const raw = [`To: me`, `Subject: Reconciliation ${month}`, `Content-Type: text/plain; charset=utf-8`, ``, body].join("\n");
    const encoded = btoa(unescape(encodeURIComponent(raw))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
    try {
      const res = await fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/send", {
        method: "POST",
        headers: { "Authorization": `Bearer ${sheetsToken}`, "Content-Type": "application/json" },
        body: JSON.stringify({ raw: encoded })
      });
      const json = await res.json();
      if (json.error) throw new Error(json.error.message);
      setGmailStatus("success");
    } catch (e) {
      setGmailStatus("error: " + e.message);
    }
  }

  function copyEmail() {
    navigator.clipboard.writeText(buildEmail());
    setEmailCopied(true);
    setTimeout(() => setEmailCopied(false), 2000);

    e.preventDefault(); setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (f?.type === "application/pdf") setFile(f);
  }, []);

  const discrepantCount = matches.filter(m => m.discrepancies.length > 0).length;
  const sel = { width: "100%", background: "#1a1a1a", border: "1px solid #333", color: "#e8e3d5", padding: "10px 14px", fontSize: "14px", borderRadius: "4px" };
  const label = { fontSize: "11px", letterSpacing: "2px", color: "#888", textTransform: "uppercase", display: "block", marginBottom: "8px" };

  return (
    <div style={{ minHeight: "100vh", background: "#0f0f0f" }}>
      <div style={{ borderBottom: "1px solid #2a2a2a", padding: "28px 40px 20px", display: "flex", alignItems: "baseline", gap: "16px" }}>
        <div style={{ fontSize: "11px", letterSpacing: "4px", color: "#666", textTransform: "uppercase" }}>Practice Finance</div>
        <div style={{ fontSize: "22px", color: "#c9b97a", fontStyle: "italic" }}>Monthly Reconciliation</div>
      </div>

      <div style={{ maxWidth: "900px", margin: "0 auto", padding: "40px" }}>

        {/* API KEY */}
        {!apiKeySet && (
          <div style={{ maxWidth: "500px", margin: "60px auto", textAlign: "center" }}>
            <div style={{ fontSize: "13px", color: "#888", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "8px" }}>Setup</div>
            <div style={{ fontSize: "28px", marginBottom: "8px" }}>Enter Your API Key</div>
            <div style={{ color: "#666", fontSize: "14px", marginBottom: "32px" }}>Stays in your browser only — never stored anywhere</div>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
              placeholder="sk-ant-..."
              style={{ width: "100%", background: "#1a1a1a", border: "1px solid #333", color: "#e8e3d5", padding: "12px 14px", fontSize: "13px", borderRadius: "4px", fontFamily: "monospace", marginBottom: "16px", boxSizing: "border-box" }}
            />
            <button onClick={() => apiKey.startsWith("sk-ant-") ? setApiKeySet(true) : alert("Please enter a valid key starting with sk-ant-")}
              style={{ background: "#c9b97a", color: "#0f0f0f", border: "none", borderRadius: "4px", padding: "12px 32px", fontSize: "14px", cursor: "pointer", fontFamily: "Georgia, serif", fontStyle: "italic" }}>
              Continue →
            </button>
            <div style={{ marginTop: "16px", fontSize: "11px", color: "#555" }}>Get your key at platform.claude.com → API Keys</div>
          </div>
        )}

        {/* UPLOAD */}
        {apiKeySet && step === "upload" && (
          <div>
            <div style={{ marginBottom: "32px" }}>
              <div style={{ fontSize: "13px", color: "#888", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "8px" }}>
                {account === "BoA" ? "Step 1 of 4" : "Step 3 of 4"}
              </div>
              <div style={{ fontSize: "28px", marginBottom: "6px" }}>
                {account === "BoA" ? "Upload BoA Statement" : "Upload Amex Statement"}
              </div>
              <div style={{ color: "#666", fontSize: "14px" }}>
                {account === "BoA" ? "PDF export from Bank of America" : "PDF export from American Express"}
              </div>
            </div>
            <div style={{ display: "flex", gap: "16px", marginBottom: "28px" }}>
              <div style={{ flex: 1 }}><span style={label}>Statement Month</span>
                <select value={month} onChange={e => setMonth(e.target.value)} style={sel}>
                  {MONTH_LABELS.map(m => <option key={m}>{m}</option>)}
                </select>
              </div>
            </div>
            <div onDrop={onDrop} onDragOver={e => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)}
              onClick={() => document.getElementById("pdf-input").click()}
              style={{ border: `2px dashed ${dragOver ? "#c9b97a" : file ? "#4a7c59" : "#333"}`, borderRadius: "8px", padding: "60px 40px", textAlign: "center", cursor: "pointer", background: "#141414", marginBottom: "24px" }}>
              <div style={{ fontSize: "36px", marginBottom: "12px" }}>{file ? "📄" : "⬆️"}</div>
              <div style={{ fontSize: "16px", color: file ? "#4a7c59" : "#999", marginBottom: "6px" }}>{file ? file.name : "Drop your PDF here, or click to browse"}</div>
              <div style={{ fontSize: "12px", color: "#555" }}>{file ? `${(file.size/1024).toFixed(0)} KB` : "Accepts .pdf files"}</div>
              <input id="pdf-input" type="file" accept="application/pdf" style={{ display: "none" }} onChange={e => setFile(e.target.files[0])} />
            </div>
            {error && <div style={{ background: "#2a1515", border: "1px solid #5a2020", borderRadius: "4px", padding: "12px 16px", marginBottom: "16px", color: "#e07070", fontSize: "13px" }}>{error}</div>}

            {/* Sign in with Google first to get live amounts */}
            {!sheetsToken && (
              <div style={{ marginBottom: "16px", padding: "14px 18px", background: "#1a1a14", border: "1px solid #3a3420", borderRadius: "6px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <div style={{ fontSize: "13px", color: "#888" }}>Sign in with Google to use live expected amounts from your sheet</div>
                <button onClick={signInWithGoogle} style={{ background: "#fff", color: "#333", border: "1px solid #ddd", borderRadius: "6px", padding: "8px 16px", fontSize: "13px", cursor: "pointer", display: "inline-flex", alignItems: "center", gap: "8px", whiteSpace: "nowrap" }}>
                  <svg width="16" height="16" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                  </svg>
                  Sign in with Google
                </button>
              </div>
            )}
            {sheetsToken && (
              <div style={{ marginBottom: "16px", padding: "10px 16px", background: "#0f1a12", border: "1px solid #2a4a2a", borderRadius: "6px", fontSize: "13px", color: "#7ab87a" }}>
                ✓ Signed in — using live expected amounts from your Google Sheet
              </div>
            )}

            <button onClick={() => file && parsePDF(file)} disabled={!file}
              style={{ background: file ? "#c9b97a" : "#2a2a2a", color: file ? "#0f0f0f" : "#555", border: "none", borderRadius: "4px", padding: "14px 32px", fontSize: "14px", cursor: file ? "pointer" : "not-allowed", fontFamily: "Georgia, serif", fontStyle: "italic" }}>
              Analyze Statement →
            </button>
          </div>
        )}

        {/* PARSING */}
        {apiKeySet && step === "parsing" && (
          <div style={{ textAlign: "center", padding: "80px 0" }}>
            <div style={{ fontSize: "40px", marginBottom: "20px" }}>⚙️</div>
            <div style={{ fontSize: "20px", color: "#c9b97a", marginBottom: "8px", fontStyle: "italic" }}>Reading your statement…</div>
            <div style={{ color: "#555", fontSize: "13px" }}>Matching transactions to your vendor list</div>
          </div>
        )}

        {/* REVIEW */}
        {apiKeySet && step === "review" && (
          <div>
            <div style={{ marginBottom: "32px", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
              <div>
                <div style={{ fontSize: "13px", color: "#888", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "8px" }}>
                {account === "BoA" ? "Step 2 of 4" : "Step 4 of 4"}
              </div>
                <div style={{ fontSize: "28px" }}>Reconciliation — {month} ({account})</div>
                <div style={{ fontSize: "12px", marginTop: "6px", color: sheetVendors ? "#4a7c59" : "#666" }}>
                  {sheetVendors ? `✓ Using live amounts from your Google Sheet` : `Using hardcoded amounts — sign in on Step 3 to sync`}
                </div>
              </div>
              {account === "BoA"
                ? <button onClick={() => { setAccount("Amex"); setFile(null); setMatches([]); setUnmatched([]); setMissing([]); setStep("upload"); }} style={B("#c9b97a", "#0f0f0f")}>Next: Upload Amex Statement →</button>
                : <button onClick={() => setStep("sheet")} style={B("#c9b97a", "#0f0f0f")}>Update Google Sheet →</button>
              }
            </div>
            <div style={{ display: "flex", gap: "12px", marginBottom: "28px" }}>
              {[
                { label: "Matched", count: matches.length, color: "#4a7c59" },
                { label: "Discrepancies", count: discrepantCount, color: "#c9a04a" },
                { label: "Missing", count: missing.length, color: "#c94a4a" },
                { label: "Unrecognized", count: unmatched.length, color: "#4a6a8a" },
              ].map(b => (
                <div key={b.label} style={{ background: "#1a1a1a", border: `1px solid ${b.color}44`, borderRadius: "6px", padding: "12px 20px", textAlign: "center", flex: 1 }}>
                  <div style={{ fontSize: "24px", color: b.color, fontStyle: "italic" }}>{b.count}</div>
                  <div style={{ fontSize: "11px", color: "#666", letterSpacing: "1px", textTransform: "uppercase", marginTop: "2px" }}>{b.label}</div>
                </div>
              ))}
            </div>
            {matches.length > 0 && (
              <Section title="✅ Confirmed Payments" color="#4a7c59">
                {matches.map((m, i) => <Row key={i} label={m.vendorMatch} amount={fmt(m.amount)} date={m.date} note={m.discrepancies.length > 0 ? m.discrepancies.join("; ") : (m.notes?.length > 0 ? m.notes.join("; ") : null)} noteColor={m.discrepancies.length > 0 ? "#c9a04a" : "#557a66"} warn={m.discrepancies.length > 0} />)}
              </Section>
            )}
            {missing.length > 0 && (
              <Section title="❌ Missing Charges" color="#c94a4a">
                {missing.map((v, i) => <Row key={i} label={v.name} amount={fmt(v.expectedAmount)} date={`expected ~${v.chargeDay ?? "?"}`} noteColor="#c94a4a" />)}
              </Section>
            )}
            {unmatched.length > 0 && (
              <Section title="🔍 Unrecognized Transactions" color="#4a6a8a">
                {unmatched.map((t, i) => <Row key={i} label={t.description} amount={fmt(t.amount)} date={t.date} />)}
              </Section>
            )}
          </div>
        )}

        {/* SHEET */}
        {apiKeySet && step === "sheet" && (
          <div>
            <div style={{ marginBottom: "32px" }}>
              <div style={{ fontSize: "13px", color: "#888", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "8px" }}>Step 3 of 4</div>
              <div style={{ fontSize: "28px", marginBottom: "6px" }}>Update Google Sheet</div>
              <div style={{ color: "#666", fontSize: "14px" }}>Sign in with Google to write to your spreadsheet</div>
            </div>
            <div>
                <div style={{ background: "#0f1a12", border: "1px solid #2a4a2a", borderRadius: "8px", padding: "16px 20px", marginBottom: "20px", display: "flex", alignItems: "center", gap: "10px" }}>
                  <div style={{ color: "#4a7c59", fontSize: "18px" }}>✓</div>
                  <div style={{ color: "#7ab87a", fontSize: "14px" }}>
                    {sheetsToken ? "Signed in — ready to update your sheet" : "Not signed in — sheet update unavailable"}
                  </div>
                </div>
                <div style={{ display: "flex", gap: "12px", marginBottom: "24px" }}>
                  {sheetsToken && <button onClick={writeToSheets} style={B("#c9b97a", "#0f0f0f")}>Write to Sheet</button>}
                  <button onClick={() => setStep("email")} style={B("#2a2a2a", "#888")}>Skip → Email</button>
                </div>
                {sheetStatus === "loading" && <Msg color="#c9b97a">Writing to Google Sheets…</Msg>}
                {sheetStatus === "success" && (
                  <div>
                    <Msg color="#4a7c59">✅ {account} sheet updated!</Msg>
                    <div style={{ display: "flex", gap: "12px", marginTop: "12px" }}>

                      <button onClick={() => setStep("email")} style={B("#4a7c59", "#fff")}>
                        {amexResults || account === "Amex" ? "Generate & Send Email →" : "Skip Amex → Email"}
                      </button>
                    </div>
                  </div>
                )}
                {sheetStatus?.startsWith("error") && <Msg color="#c94a4a">{sheetStatus}</Msg>}
              </div>
          </div>
        )}

        {/* EMAIL */}
        {apiKeySet && step === "email" && (
          <div>
            <div style={{ marginBottom: "24px" }}>
              <div style={{ fontSize: "13px", color: "#888", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "8px" }}>Done</div>
              <div style={{ fontSize: "28px", marginBottom: "6px" }}>Summary Email</div>
            </div>
            <pre style={{ background: "#141414", border: "1px solid #2a2a2a", borderRadius: "8px", padding: "24px", color: "#c8c0a8", fontSize: "13px", lineHeight: "1.7", whiteSpace: "pre-wrap", wordBreak: "break-word", maxHeight: "400px", overflowY: "auto", fontFamily: "'Courier New', monospace" }}>
              {buildEmail()}
            </pre>
            <div style={{ display: "flex", gap: "12px", marginTop: "16px", flexWrap: "wrap" }}>
              {sheetsToken && (
                <button onClick={sendGmail} style={B("#c9b97a", "#0f0f0f")}>
                  {gmailStatus === "loading" ? "Sending…" : gmailStatus === "success" ? "✓ Sent!" : "Send to My Email"}
                </button>
              )}
              <button onClick={copyEmail} style={B("#2a2a2a", "#aaa")}>{emailCopied ? "✓ Copied!" : "Copy"}</button>
              <button onClick={() => window.open(`mailto:?subject=Reconciliation ${month}&body=${encodeURIComponent(buildEmail())}`)} style={B("#2a2a2a", "#aaa")}>Open in Mail</button>
              <button onClick={() => { setStep("upload"); setFile(null); setMatches([]); setUnmatched([]); setMissing([]); setSheetStatus(null); setGmailStatus(null); setBoaResults(null); setAmexResults(null); setAccount("BoA"); }} style={B("#1a1a1a", "#666")}>
                Start New Month
              </button>
            </div>
            {gmailStatus?.startsWith("error") && <div style={{ marginTop: "12px" }}><Msg color="#c94a4a">{gmailStatus}</Msg></div>}
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
